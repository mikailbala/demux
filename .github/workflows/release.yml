name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: npm pack
      - name: Upload tarball to release
        uses: softprops/action-gh-release@v2
        with:
          files: demux-*.tgz
          generate_release_notes: true
